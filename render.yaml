services:
  - type: web
    name: metagauge-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/api/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_TYPE
        value: postgres
      - key: POSTGRES_SSL
        value: "true"
      - key: POSTGRES_MAX_CONNECTIONS
        value: "5"
      # Set these in Render dashboard (secrets):
      # POSTGRES_HOST, POSTGRES_PORT, POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
      # JWT_SECRET, GEMINI_API_KEY, FRONTEND_URL
      # ETHEREUM_RPC_URL1, ETHEREUM_RPC_URL2
